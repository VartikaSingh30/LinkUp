<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>Chat • LinkUp</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="favicon.svg" />
    <script defer src="chat.js"></script>
  </head>
  <body>
    <!-- Header / Top Nav -->
    <header class="topbar card">
      <div class="topbar__left">
        <a href="index.html" class="brand" aria-label="LinkUp Home">
          <span class="brand__logo" aria-hidden="true">LU</span>
          <span class="brand__text">LinkUp</span>
        </a>
        <label class="search">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path></svg>
          <input id="search" type="search" placeholder="Search" />
        </label>
      </div>
      <nav class="topbar__right">
        <a href="index.html" class="icon-btn" title="Home" aria-label="Home">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"></path></svg>
        </a>
        <a href="network.html" class="icon-btn" title="My Network" aria-label="My Network">
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V20h14v-3.5C15 14.17 10.33 13 8 13zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V20h6v-3.5c0-2.33-4.67-3.5-7-3.5z"></path></svg>
        </a>
        <a href="chat.html" class="icon-btn" title="Chat" aria-label="Chat" style="background: rgba(102, 126, 234, 0.1); color: var(--primary);">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"></path></svg>
        </a>
        <a href="profile.html" class="me-chip" title="View Profile">
          <div class="avatar avatar--sm" id="meAvatar" aria-hidden="true">V</div>
        </a>
      </nav>
    </header>

    <main class="container" style="max-width: 900px; grid-template-columns: 1fr;">
      <!-- Chat Section -->
      <section class="card chat-container">
        <div class="chat-header">
          <div class="chat-header-info">
            <div class="avatar avatar--sm" style="background: linear-gradient(135deg, #667eea, #764ba2);">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
              </svg>
            </div>
            <div>
              <h2 class="chat-title">AI Assistant</h2>
              <p class="chat-subtitle">AI Friend</p>
            </div>
          </div>
          <button id="clearChat" class="btn btn--ghost" style="padding: 0.5rem 1rem;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
            Clear
          </button>
        </div>

        <div class="chat-messages" id="chatMessages">
          <div class="chat-welcome">
            <div class="welcome-icon">
              <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
              </svg>
            </div>
            <h3>Welcome to AI Chat!</h3>
            <p>Start a conversation with the AI assistant. Ask questions, get help, or just chat!</p>
          </div>
        </div>

        <div class="chat-input-container">
          <form id="chatForm" class="chat-form">
            <div class="chat-input-wrapper">
              <textarea 
                id="messageInput" 
                placeholder="Type your message here..." 
                rows="1"
                aria-label="Message input"
              ></textarea>
              <button 
                type="submit" 
                id="sendBtn" 
                class="send-btn" 
                title="Send message"
                disabled
              >
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
              </button>
            </div>
          </form>
        </div>
      </section>
    </main>

    <footer class="footer muted">
      <div>© <span id="year"></span> LinkUp • A simple demo (not affiliated).</div>
    </footer>
  </body>
</html>
