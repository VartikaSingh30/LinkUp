<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>LinkUp • Professional Network</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="favicon.svg" />
    <script defer src="app.js"></script>
  </head>
  <body>
    <!-- Header / Top Nav -->
    <header class="topbar card">
      <div class="topbar__left">
        <a href="#" class="brand" aria-label="LinkUp Home">
          <span class="brand__logo" aria-hidden="true">LU</span>
          <span class="brand__text">LinkUp</span>
        </a>
        <label class="search">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path></svg>
          <input id="search" type="search" placeholder="Search" />
        </label>
      </div>
      <nav class="topbar__right">
        <button class="icon-btn" title="Home" aria-label="Home">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"></path></svg>
        </button>
        <a href="network.html" class="icon-btn" title="My Network" aria-label="My Network">
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V20h14v-3.5C15 14.17 10.33 13 8 13zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V20h6v-3.5c0-2.33-4.67-3.5-7-3.5z"></path></svg>
        </a>
        <a href="chat.html" class="icon-btn" title="Chat" aria-label="Chat">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"></path></svg>
        </a>
        <a href="profile.html" class="me-chip" title="View Profile">
          <div class="avatar avatar--sm" id="meAvatar" aria-hidden="true">V</div>
        </a>
      </nav>
    </header>

    <main class="container">
      <!-- Left Sidebar -->
      <aside class="sidebar-left">
        <section class="card profile-card">
          <div class="profile-card__header"></div>
          <div class="profile-card__body">
            <div class="avatar" id="profileAvatar">VS</div>
            <h2 class="profile__name" id="profileName">Vartika Singh</h2>
            <p class="profile__headline" id="profileHeadline">Computer Science Student at VIT Vellore</p>
            <p class="profile__location" id="profileLocation">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="vertical-align: middle; margin-right: 4px;">
                <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
              </svg>
              Vellore, Tamil Nadu, India
            </p>
          </div>
          <div class="profile-card__footer">
            <a class="link" href="#">View profile</a>
          </div>
        </section>

        <nav class="card shortcuts">
          <h3 class="card__title">Manage</h3>
          <ul>
            <li><a href="#">Connections</a></li>
            <li><a href="#">Groups</a></li>
            <li><a href="#">Events</a></li>
            <li><a href="#">Saved</a></li>
          </ul>
        </nav>

        <section class="card groups-card">
          <h3 class="card__title">My Groups</h3>
          <ul class="groups-list" id="groupsList">
            <!-- Filled by JS -->
          </ul>
        </section>
      </aside>

      <!-- Feed -->
      <section class="feed">
        <!-- Composer -->
        <article class="card composer">
          <form id="composerForm">
            <div class="composer__row">
              <div class="avatar avatar--sm" id="composerAvatar">Y</div>
              <textarea id="composerText" rows="3" placeholder="Start a post" aria-label="Write a post..."></textarea>
            </div>
            <div class="composer__actions">
              <label class="btn btn--ghost">
                <input id="composerImage" type="file" accept="image/*" hidden />
                <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M21 19V5a2 2 0 00-2-2H5a2 2 0 00-2 2v14l4-4h12l2 2zM7 9a2 2 0 110-4 2 2 0 010 4z"></path></svg>
                Add image
              </label>
              <div class="grow"></div>
              <span class="muted" id="charCount">0/500</span>
              <button id="postBtn" class="btn" type="submit" disabled>Post</button>
            </div>
            <div id="imagePreview" class="image-preview" hidden></div>
          </form>
        </article>

        <!-- Posts will render here -->
        <div id="feed"></div>
      </section>
    </main>

    <footer class="footer muted">
      <div>© <span id="year"></span> LinkUp • A simple demo (not affiliated).</div>
    </footer>
  </body>
</html>
